<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>运营笔记</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <style>
        :root {
            /* 缩小基础字号 */
            --pico-font-size: 87.5%;
            /* 按钮、输入框上下内边距缩小 */
            --pico-form-element-padding-block: 0.3rem;
            --pico-form-element-padding-inline: 0.6rem;
            /* 行高缩小 */
            --pico-line-height: 1.4;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.js"></script>
</head>

<body>
    <div id="app">
        <!-- <a href="./24.html">24点</a> -->
        <button @click="add">添加数据</button>
        <input type="file" multiple @change="changeImg">
    </div>
</body>

<script type="module">
    import { url, key, img_url } from './index.js';

    new Vue({
        el: '#app',
        data() {
            return {
                msg: '原生引入Vue成功'
            }
        },
        created() {
            this.getData()
        },
        methods: {
            getData() {
                fetch(url + 'notes_list', {
                    method: "GET",
                    headers: {
                        apikey: key,
                        Authorization: `Bearer ${key}`
                    }
                })
                    .then(res => res.json())
                    .then(data => console.log(data));
            },
            add() {
                fetch(url + 'notes_list', {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "apikey": key,
                        "Authorization": `Bearer ${key}`,
                        "Prefer": "return=representation"
                    },
                    body: JSON.stringify({
                        sku: "8811",
                        content: "笔记内容",
                        type: 2,//1开头是电商 2开头是前端
                        remark: "无",
                        title: "无",
                        level: 1
                    })
                })
                    .then(res => res.json())
                    .then(data => console.log("插入成功：", data));
            },
            changeImg({target:{files}}) {
                // const file = document.querySelector("input").files[0];
                console.log(files);
                
                Array.from(files).forEach(file => {
                    // file.name=file.name.toLowerCase().replace(/\s+/g, "_").replace(/[^a-z0-9._-]/g, "");
                    // console.log(123);
                    
                });
                const file= files[0]

                const url = "https://daixzsefottmustefsuj.supabase.co/storage/v1/object/images/" + file.name.toLowerCase().replace(/\s+/g, "_").replace(/[^a-z0-9._-]/g, "")
                // return
                fetch(url, {
                    method: "POST",
                    headers: {
                        apikey: key,
                        "Authorization": `Bearer ${key}`,
                        "Content-Type": file.type
                    },
                    body: file
                })
                    .then(res => res.json())
                    .then(data => {
                        console.log("上传成功", data);

                        const publicUrl =
                            "https://daixzsefottmustefsuj.supabase.co/storage/v1/object/public/images/" +
                            file.name.toLowerCase().replace(/\s+/g, "_").replace(/[^a-z0-9._-]/g, "")

                        console.log("图片URL：", publicUrl);
                    });
            }
        }
    })






</script>
